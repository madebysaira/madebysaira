<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#1a1a22"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#2997ff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#5856d6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2997ff"/>
      <stop offset="100%" stop-color="#30d158"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a8a8ad"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2997ff"/>
      <stop offset="100%" stop-color="#8b88f0"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Dome arc, decorative -->
  <g opacity="0.18" stroke="#2997ff" fill="none" stroke-linecap="round">
    <path d="M 80 520 Q 600 80 1120 520" stroke-width="1.5"/>
    <path d="M 80 520 Q 600 160 1120 520" stroke-width="1" opacity="0.7"/>
    <path d="M 80 520 Q 600 240 1120 520" stroke-width="1" opacity="0.5"/>
    <path d="M 80 520 Q 600 320 1120 520" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- Brand row -->
  <g transform="translate(80,90)">
    <circle cx="14" cy="14" r="14" fill="url(#dot)"/>
    <text x="42" y="22" font-family="-apple-system, Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#f5f5f7" letter-spacing="-0.3">DataDome Bypass</text>
    <text x="42" y="50" font-family="-apple-system, Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="500" fill="#6e6e73" letter-spacing="1.2" text-transform="uppercase">API · DOCUMENTATION</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80,250)">
    <text font-family="-apple-system, Inter, Helvetica, Arial, sans-serif" font-size="96" font-weight="700" letter-spacing="-3" fill="url(#title)">
      <tspan x="0" y="0">Solve DataDome</tspan>
      <tspan x="0" y="110">challenges, </tspan><tspan font-family="Instrument Serif, Georgia, serif" font-style="italic" font-weight="400" fill="url(#accent)">instantly</tspan><tspan fill="url(#title)">.</tspan>
    </text>
  </g>

  <!-- Subtitle -->
  <g transform="translate(80,500)">
    <text font-family="-apple-system, Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#a8a8ad" letter-spacing="-0.4">A self-hosted API that returns the cookies your scrapers</text>
    <text y="34" font-family="-apple-system, Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#a8a8ad" letter-spacing="-0.4">and AI agents need to read protected pages.</text>
  </g>

  <!-- URL pill, bottom right -->
  <g transform="translate(800,556)">
    <rect x="0" y="0" width="320" height="38" rx="19" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
    <circle cx="22" cy="19" r="4" fill="#30d158"/>
    <text x="38" y="24" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="13" fill="#f5f5f7">hackerssdatadomesss.up.railway.app</text>
  </g>
</svg>
