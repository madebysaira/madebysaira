<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Saira">
  <defs>
    <radialGradient id="glow" cx="50%" cy="118%" r="95%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="42%" stop-color="#1e3a8a"/>
      <stop offset="78%" stop-color="#0b0f24"/>
      <stop offset="100%" stop-color="#060612"/>
    </radialGradient>
  </defs>
  <!-- Cosmic tile -->
  <rect width="64" height="64" fill="url(#glow)"/>
  <!-- Framed wordmark box, echoing the site logo -->
  <rect x="4" y="4" width="56" height="56" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2.5"/>
  <!-- S monogram -->
  <text x="32" y="34" text-anchor="middle" dominant-baseline="central"
        font-family="'Poppins', 'Helvetica Neue', Arial, sans-serif"
        font-weight="800" font-size="40" fill="#ffffff">S</text>
</svg>
